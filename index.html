<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chore Deck Game - Deck System (V3)</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e2e8f0;
}

header {
  padding: 16px;
  background: rgba(30, 41, 59, 0.8);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(148,163,184,0.2);
}

h2 { margin: 0; font-weight: 800; }

.nav {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 10px;
  background: rgba(15, 23, 42, 0.8);
}

.nav button {
  background: rgba(51, 65, 85, 0.7);
  color: white;
  border: 1px solid rgba(148,163,184,0.2);
  padding: 10px 14px;
  border-radius: 12px;
  cursor: pointer;
}

.section {
  display: none;
  padding: 20px;
  animation: fadeIn 0.3s ease;
}

.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.card, .chore {
  background: rgba(30, 41, 59, 0.8);
  border: 1px solid rgba(148,163,184,0.2);
  padding: 12px;
  margin: 8px 0;
  border-radius: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  border: none;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
}

.action { background: #22c55e; }
.pack { background: #f59e0b; }
.play { background: #3b82f6; color: white; }

#coins { color: #facc15; font-weight: 800; }

.hand {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(15,23,42,0.95);
  padding: 10px 16px;
  border-radius: 12px;
  opacity: 0;
  transition: 0.3s;
}

.toast.show { opacity: 1; }

</style>
</head>
<body>

<header>
  <h2>🎮 Chore Deck Game (V3)</h2>
  <div>💰 Coins: <span id="coins">0</span></div>
</header>

<div class="nav">
  <button onclick="show('home')">Home</button>
  <button onclick="show('chores')">Chores</button>
  <button onclick="show('deck')">Deck</button>
  <button onclick="show('session')">Weekly Session</button>
  <button onclick="show('packs')">Packs</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <h3>Welcome</h3>
  <p>Do chores → earn coins → build deck → play weekly sessions</p>
</div>

<!-- CHORES -->
<div id="chores" class="section">
  <h3>🧹 Chores</h3>

  <div class="chore">Wash Dishes (+2)
    <button class="action" onclick="completeChore(2)">Complete</button>
  </div>

  <div class="chore">Sweep Floor (+1)
    <button class="action" onclick="completeChore(1)">Complete</button>
  </div>

  <div class="chore">Take Trash (+2)
    <button class="action" onclick="completeChore(2)">Complete</button>
  </div>
</div>

<!-- DECK -->
<div id="deck" class="section">
  <h3>🃏 Deck</h3>
  <button class="pack" onclick="drawCard()">Draw Card (1 coin)</button>
  <div id="deckList"></div>
</div>

<!-- SESSION -->
<div id="session" class="section">
  <h3>⚔️ Weekly Session</h3>
  <button class="play" onclick="startSession()">Start Session (Draw 3 cards)</button>
  <h4>Your Hand</h4>
  <div class="hand" id="hand"></div>
  <h4>Play Area</h4>
  <div id="log"></div>
</div>

<!-- PACKS -->
<div id="packs" class="section">
  <h3>📦 Packs</h3>
  <button class="pack" onclick="openPack()">Open Pack (5 coins)</button>
</div>

<div id="toast" class="toast"></div>

<script>
let coins = 0;
let deck = ["Bonus +3 Coins", "Double Reward", "Steal 1 Coin", "Swap Chore", "Free Skip Chore"];
let hand = [];

const cardPool = [
  "Bonus +3 Coins",
  "Double Reward",
  "Steal 1 Coin",
  "Swap Chore",
  "Free Skip Chore",
  "Block Attack"
];

function updateUI() {
  document.getElementById("coins").innerText = coins;

  document.getElementById("deckList").innerHTML = deck.map(c => `<div class='card'>${c}</div>`).join("");

  document.getElementById("hand").innerHTML = hand.map((c,i) => 
    `<div class='card'>${c}<button class='play' onclick='playCard(${i})'>Play</button></div>`
  ).join("");

  localStorage.setItem("coins", coins);
  localStorage.setItem("deck", JSON.stringify(deck));
}

function completeChore(amount){
  coins += amount;
  toast("+"+amount+" coins");
  updateUI();
}

function drawCard(){
  if(coins < 1){toast("Need 1 coin");return;}
  coins--;
  const card = deck[Math.floor(Math.random()*deck.length)];
  hand.push(card);
  toast("Drew: "+card);
  updateUI();
}

function startSession(){
  hand = [];
  for(let i=0;i<3;i++) drawCard();
  updateUI();
}

function playCard(i){
  const card = hand[i];
  hand.splice(i,1);

  if(card === "Bonus +3 Coins") coins += 3;
  if(card === "Double Reward") coins += 2;
  if(card === "Steal 1 Coin") coins += 1;
  if(card === "Swap Chore") coins += 1;
  if(card === "Free Skip Chore") toast("Skip saved");
  if(card === "Block Attack") toast("Blocked!");

  toast("Played: "+card);
  updateUI();
}

function openPack(){
  if(coins < 5){toast("Not enough coins");return;}
  coins -= 5;
  const card = cardPool[Math.floor(Math.random()*cardPool.length)];
  deck.push(card);
  toast("New card: "+card);
  updateUI();
}

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1200);
}

coins = parseInt(localStorage.getItem("coins")||"0");
deck = JSON.parse(localStorage.getItem("deck")||JSON.stringify(deck));
updateUI();
</script>

</body>
</html>
